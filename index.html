<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Speed HUD</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
cursor:pointer;
font-family:'Montserrat',sans-serif;
color:#fff;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#city{
position:absolute;
bottom:20px;
left:20px;
font-size:18px;
color:#777;
}

#speed{
font-weight:700;
font-size:min(35vw,35vh);
line-height:1;
}

#limit{
font-size:min(6vw,6vh);
color:#666;
margin-top:5px;
}

.flipped{
transform:rotate(180deg) scaleX(-1);
}

.speed-ok{color:#fff}
.speed-warn{color:yellow}
.speed-over{color:red}

#gps{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:4px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#333;
}

/* HUD MODE */
.hud #limit,
.hud #gps,
.hud #city{
display:none;
}

.hud #speed{
font-size:min(90vw,90vh);
}

/* WAKE BUTTON OVERLAY */
#start{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#start button{
padding:15px 25px;
font-size:16px;
font-weight:700;
border:none;
border-radius:10px;
background:#fff;
color:#000;
cursor:pointer;
}
</style>
</head>

<body>

<div id="start">
<button id="startBtn">START HUD</button>
</div>

<div class="container">
<div id="city"></div>
<div id="speed">0</div>
<div id="limit">--</div>
</div>

<div id="gps">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<script>
const speedEl=document.getElementById("speed")
const limitEl=document.getElementById("limit")
const cityEl=document.getElementById("city")
const dots=[...document.querySelectorAll(".dot")]
const startBtn=document.getElementById("start")
const startOverlay=document.getElementById("start")

let hud=false
let flipped=false

let lastValidSpeed=0
let gpsLostAt=0

let wakeLock=null

// ===== START BUTTON (fixes wake lock requirement) =====
startBtn.addEventListener("click",async()=>{
startOverlay.style.display="none"

if(!document.fullscreenElement){
document.documentElement.requestFullscreen?.()
}

await requestWakeLock()
})

async function requestWakeLock(){
try{
if("wakeLock"in navigator){
wakeLock=await navigator.wakeLock.request("screen")
}
}catch{}
}

// ===== MODE SWITCH =====
document.body.addEventListener("click",(e)=>{
if(e.target.id==="startBtn") return

hud=!hud
flipped=!flipped

document.body.classList.toggle("hud",hud)

speedEl.classList.toggle("flipped",flipped)
limitEl.classList.toggle("flipped",flipped)
cityEl.classList.toggle("flipped",flipped)
})

// ===== GPS DOTS =====
function setDots(acc){
if(acc<10){
dots[0].style.background="red"
dots[1].style.background="#333"
dots[2].style.background="#333"
}
else if(acc<20){
dots[0].style.background="yellow"
dots[1].style.background="yellow"
dots[2].style.background="#333"
}
else{
dots[0].style.background="green"
dots[1].style.background="green"
dots[2].style.background="green"
}
}

// ===== SPEED LIMIT =====
let speedLimit=null
let lastFetch=0

async function fetchSpeedLimit(lat,lon){
const now=Date.now()
if(now-lastFetch<5000) return speedLimit
lastFetch=now

const q=`[out:json];way(around:60,${lat},${lon})["maxspeed"];out tags;`

try{
const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:q})
const d=await r.json()

if(d.elements?.length){
speedLimit=parseInt(d.elements[0].tags.maxspeed)
}
}catch{}

return speedLimit
}

// ===== DISTANCE =====
function getDistance(a,b,c,d){
const R=6371000,toRad=x=>x*Math.PI/180
const dLat=toRad(c-a),dLon=toRad(d-b)
const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2
return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

let lastPos=null
let lastTime=null

navigator.geolocation.watchPosition(async pos=>{
const now=Date.now()
const c=pos.coords

setDots(c.accuracy)

// ===== SPEED (ALWAYS UPDATED — FIXED BUG) =====
let speed=0

if(c.speed!=null){
speed=c.speed*3.6
}else if(lastPos){
const dist=getDistance(lastPos.latitude,lastPos.longitude,c.latitude,c.longitude)
const dt=(now-lastTime)/1000
speed=(dist/dt)*3.6
}

// HOLD
if(speed>0){
lastValidSpeed=speed
gpsLostAt=0
}else{
if(!gpsLostAt) gpsLostAt=now
if(now-gpsLostAt<3000){
speed=lastValidSpeed
}else{
speedEl.textContent="🚫 GPS"
return
}
}

// ===== NORMAL MODE =====
let limit=null

if(!hud){
limit=await fetchSpeedLimit(c.latitude,c.longitude)
limitEl.textContent=limit?limit:"50"
}

// ===== RENDER SPEED (FIX FOR NORMAL FREEZE) =====
speedEl.textContent=Math.round(speed)

// ===== COLOR NORMAL ONLY =====
if(!hud){
speedEl.classList.remove("speed-ok","speed-warn","speed-over")

if(limit){
const diff=speed-limit
if(diff>=11) speedEl.classList.add("speed-over")
else if(diff>=1) speedEl.classList.add("speed-warn")
else speedEl.classList.add("speed-ok")
}else{
speedEl.classList.add("speed-ok")
}
}

// ===== CITY =====
if(!hud){
getCity(c.latitude,c.longitude).then(city=>{
if(city) cityEl.textContent=city
})
}

lastPos=c
lastTime=now

},()=>speedEl.textContent="🚫 GPS",{
enableHighAccuracy:true,
maximumAge:0,
timeout:3000
})
</script>

</body>
</html>
