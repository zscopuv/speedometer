<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Speed HUD</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
cursor:pointer;
font-family:'Montserrat',sans-serif;
color:#fff;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#city{
position:absolute;
bottom:20px;
left:20px;
font-size:18px;
color:#777;
}

#speed{
font-weight:700;
font-size:min(35vw,35vh);
line-height:1;
}

#limit{
font-size:min(6vw,6vh);
color:#666;
margin-top:5px;
}

.flipped{
transform:rotate(180deg) scaleX(-1);
}

/* NORMAL COLORS */
.speed-ok{color:#fff}
.speed-warn{color:yellow}
.speed-over{color:red}

/* GPS dots */
#gps{
position:absolute;
bottom:20px;
right:20px;
display:flex;
gap:4px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#333;
}

/* HUD MODE */
.hud #limit,
.hud #gps,
.hud #city{
display:none;
}

.hud #speed{
font-size:min(90vw,90vh);
}
</style>
</head>

<body>

<div class="container">
<div id="city"></div>
<div id="speed">0</div>
<div id="limit">--</div>
</div>

<div id="gps">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<script>
const speedEl=document.getElementById("speed")
const limitEl=document.getElementById("limit")
const cityEl=document.getElementById("city")
const dots=[...document.querySelectorAll(".dot")]

let hud=false
let flipped=false

let lastValidSpeed=0
let gpsLostAt=0

let blinkTimer=null

// ===== LIMIT SMOOTHING (anti flicker) =====
let lastLimit=null
let limitStableCount=0

document.body.addEventListener("click",()=>{
hud=!hud
flipped=!flipped

document.body.classList.toggle("hud",hud)

speedEl.classList.toggle("flipped",flipped)
limitEl.classList.toggle("flipped",flipped)
cityEl.classList.toggle("flipped",flipped)

stopBlink()
speedEl.textContent="0"
limitEl.textContent="--"
})

// ===== BLINK SYSTEM =====
function stopBlink(){
if(blinkTimer) clearInterval(blinkTimer)
blinkTimer=null
speedEl.style.opacity="1"
speedEl.textContent=""
}

function startBlink(speed,limit){

stopBlink()

const diff=(speed-limit)/limit

let interval=150
let cycles=4
let showText=false

if(diff>0.2 && diff<=0.3){
interval=100
cycles=6
showText=true
}
else if(diff>0.3){
interval=100
cycles=999
showText=true
}

let i=0
let visible=true

blinkTimer=setInterval(()=>{
speedEl.style.opacity=visible?"0":"1"
visible=!visible
i++

if(i>=cycles*2){
stopBlink()
speedEl.style.opacity="1"
if(showText) speedEl.textContent="SLOW DOWN"
}
},interval)
}

// ===== GPS DOTS =====
function setDots(acc){
if(acc<10){
dots[0].style.background="red"
dots[1].style.background="#333"
dots[2].style.background="#333"
}
else if(acc<20){
dots[0].style.background="yellow"
dots[1].style.background="yellow"
dots[2].style.background="#333"
}
else{
dots[0].style.background="green"
dots[1].style.background="green"
dots[2].style.background="green"
}
}

// ===== COLOR (NORMAL MODE ONLY) =====
function setColor(speed,limit){

speedEl.classList.remove("speed-ok","speed-warn","speed-over")

if(speed==="GPS"){
speedEl.classList.add("speed-ok")
return
}

if(!limit){
speedEl.classList.add("speed-ok")
return
}

const diff=speed-limit

if(diff>=11) speedEl.classList.add("speed-over")
else if(diff>=1) speedEl.classList.add("speed-warn")
else speedEl.classList.add("speed-ok")
}

// ===== CITY =====
async function getCity(lat,lon){
try{
const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
const data=await res.json()
return data.address.city || data.address.town || data.address.village || ""
}catch{return ""}
}

// ===== SPEED LIMIT (WITH FLICKER FIX) =====
let speedLimit=null
let lastLimitFetch=0

async function fetchSpeedLimit(lat,lon){
const now=Date.now()

// anti flicker: must be stable before switching
if(now-lastLimitFetch<5000 && lastLimit!==null){
limitStableCount++
if(limitStableCount<3) return lastLimit
}

lastLimitFetch=now

const q=`[out:json];way(around:60,${lat},${lon})["maxspeed"];out tags;`

try{
const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:q})
const d=await r.json()

if(d.elements?.length){
let val=parseInt(d.elements[0].tags.maxspeed)

// stability check
if(val===lastLimit){
limitStableCount++
}else{
limitStableCount=0
}

lastLimit=val
speedLimit=val
}
}catch{}

return speedLimit
}

// ===== DISTANCE =====
function getDistance(a,b,c,d){
const R=6371000,toRad=x=>x*Math.PI/180
const dLat=toRad(c-a),dLon=toRad(d-b)
const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2
return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

let lastPos=null
let lastTime=null

navigator.geolocation.watchPosition(async pos=>{
const now=Date.now()
const c=pos.coords

setDots(c.accuracy)

let speed=0

if(c.speed!=null){
speed=c.speed*3.6
}else if(lastPos){
const dist=getDistance(lastPos.latitude,lastPos.longitude,c.latitude,c.longitude)
const dt=(now-lastTime)/1000
speed=(dist/dt)*3.6
}

// ===== GPS HOLD =====
if(speed>0){
lastValidSpeed=speed
gpsLostAt=0
}else{
if(!gpsLostAt) gpsLostAt=now

if(now-gpsLostAt<3000){
speed=lastValidSpeed
}else{
speedEl.textContent="🚫 GPS"
return
}
}

// ===== LIMIT =====
let limit=null

if(!hud){
limit=await fetchSpeedLimit(c.latitude,c.longitude)
limitEl.textContent=limit?limit:"50"   // fallback stays stable
setColor(speed,limit)
}

// ===== CITY =====
if(!hud){
getCity(c.latitude,c.longitude).then(city=>{
if(city) cityEl.textContent=city
})
}

// ===== HUD MODE =====
if(hud && limit){
const diff=(speed-limit)/limit

if(diff<=0.1){
stopBlink()
speedEl.textContent=Math.round(speed)
}
else{
startBlink(speed,limit)
}
}else if(hud){
speedEl.textContent=Math.round(speed)
}

lastPos=c
lastTime=now

},()=>speedEl.textContent="🚫 GPS",{
enableHighAccuracy:true,
maximumAge:0,
timeout:3000
})
</script>

</body>
</html>
